<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css ">
        <link rel="stylesheet" href="/style/main.css"/>
    </head>
    <body>
        <form>
            <fieldset>
                <table cellpadding=10 >
                <caption>
                    <h3>
                        <i class="fa-solid fa-calendar-check">
                        </i> Create BOOKING
                    </h3>
                </caption>
                <tr>
                        <td>Customer Name</label></td>
                        <td>:</td>
                        <td><input type="text" placeholder="type here..."></td>
                </tr>
                <tr>
                        <td>Gender</label></td>
                        <td>:</td>
                        <td>
                            <input type="radio"name="gender" value="female">female
                            <input type="radio"name="gender" value="male">Male
                        </td>
                </tr>
                <tr>
                        <td>Tel</label></td>
                        <td>:</td>
                        <td><input type="text" placeholder="type here..."></td>
                </tr>
                <tr>
                    <td>ID card</label></td>
                    <td>:</td>
                    <td><input type="file" placeholder="type here..."></td>
                </tr>
                <tr>    
                    <td>Check in </label></td>
                    <td>:</td>
                    <td><input type="date" placeholder="type here..."></td>
                </tr>
                <tr>                     
                    <td>Check out</label></td>
                    <td>:</td>
                    <td><input type="date" placeholder="type here..."></td>
                </tr> 
                <tr>    
                    <td><label>Room Number</label></td>
                    <td>:</td>
                    <td>
                        <select name="roomNumber">
                        <optgroup label="Single Room">
                            <option>101</option> 
                            <option>102</option>
                            <option>103</option>
                        </optgroup>
                        <optgroup label="Double Room">
                            <option>201</option> 
                            <option>202</option>
                            <option>203</option>
                        </optgroup>
                        <optgroup label="Family Room">
                            <option>301</option> 
                            <option>302</option>
                            <option>303</option>
                        </optgroup>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label>Note</label></td>
                    <td>:</td>
                    <td><textarea rows="3" cols="30"></textarea></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td>
                        <input type="submit" value="Create">
                        <input type="reset"  value="Clear">
                    </td>
                </tr>
                </table>
            </fieldset>
        </form>
    </body>
</html>
